name: release

# Cut a release when a version tag is pushed. The tag is the version and must be
# a semver-compatible date: YYYY.M.D[-a-z] (e.g. 2026.6.10 or 2026.6.10-b); see
# src/version.rs. The glob is broad; the test job validates the exact format.
on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

env:
  # The pushed tag is the release version; baked into every binary by build.rs.
  DESIGN_VERSION: ${{ github.ref_name }}

jobs:
  # Validate the tag and run the test suite before building anything.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate version tag format
        run: |
          if ! [[ "$DESIGN_VERSION" =~ ^[0-9]{4}\.([1-9]|1[0-2])\.([1-9]|[12][0-9]|3[01])(-[a-z])?$ ]]; then
            echo "::error::Tag '$DESIGN_VERSION' is not a valid semver date version YYYY.M.D[-a-z]"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # rust-embed needs ui/dist to exist before any cargo build, so build the
      # SPA first, then run the test suite.
      - name: Build driver SPA
        run: make ui

      - name: Run tests
        run: make test

  # Build a native binary per platform. Done after tests pass.
  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # ui/dist must exist before cargo build (rust-embed embeds it).
      - name: Build driver SPA
        run: |
          cd ui
          npm ci
          npm run build

      - name: Build release binary
        shell: bash
        run: |
          export DESIGN_COMMIT="${GITHUB_SHA:0:7}"
          cargo build --release --locked --target ${{ matrix.target }}

      # Package binary + license + README into a per-platform archive.
      - name: Package
        id: package
        shell: bash
        run: |
          name="design-${DESIGN_VERSION}-${{ matrix.target }}"
          mkdir "$name"
          if [[ "${{ matrix.os }}" == windows-* ]]; then
            cp "target/${{ matrix.target }}/release/design.exe" "$name/"
          else
            cp "target/${{ matrix.target }}/release/design" "$name/"
          fi
          cp README.md "$name/"
          [[ -f LICENSE ]] && cp LICENSE "$name/" || true
          if [[ "${{ matrix.os }}" == windows-* ]]; then
            7z a "${name}.zip" "$name" >/dev/null
            echo "asset=${name}.zip" >>"$GITHUB_OUTPUT"
          else
            tar -czf "${name}.tar.gz" "$name"
            echo "asset=${name}.tar.gz" >>"$GITHUB_OUTPUT"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ steps.package.outputs.asset }}
          if-no-files-found: error

  # Publish all platform archives to a GitHub Release for the tag.
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
